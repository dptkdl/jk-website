<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- i did nav.navbar then pressed tab as shortcut -->
    <!-- the shortcut for commenting out is ctrl + / -->
    <nav class="navbar">
        <!-- navbar container -->
        <!-- short cut is .navbar__container for div -->
        <div class="navbar__container">
            <!-- logo -->
            <!-- shortcut is a#navbar__logo -->
            <a href="/" id="navbar__logo">LOGO (change to an image later)</a>
            <!-- shortcut is .navbar__toggle#mobile-menu -->
            <!-- created class and id -->
            <div class="navbar__toggle" id="mobile-menu">
                <!-- span.bar -->
                <!-- to copy it down just click shift+alt+downarrow -->
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="navbar__menu">
                <!-- first menu item -->
                <li class="navbar__item">
                    <a href="/" class="navbar__links">Home</a>
                </li>
                <li class="navbar__item">
                    <!-- takes you to tech.html file -->
                    <a href="/tech.html" class="navbar__links">Tech</a>
                </li>
                <li class="navbar__item">
                    <a href="/" class="navbar__links">Products</a>
                </li>
                <li class="navbar__btn">
                    <a href="/" class="button">Sign Up</a>
                </li>
            </ul>
        </div>
    </nav>
</body>
</html>
